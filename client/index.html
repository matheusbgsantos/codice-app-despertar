<!doctype html>
<html lang="pt-BR">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>O Códice do Despertar</title>
    <meta name="description" content="O Códice do Despertar — jornada guiada de 30 dias para sair da prisão invisível." />
    <meta name="theme-color" content="#070605" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="O Códice" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Cinzel:wght@600;700;900&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Heartbeat "online agora" — pinga a cada 60s
      (function(){
        try{
          var v=localStorage.getItem('hb_id');
          if(!v){v=Date.now().toString(36)+Math.random().toString(36).slice(2,8);localStorage.setItem('hb_id',v);}
          function ping(){ fetch("https://codice-app-production.up.railway.app/api/webhook/track?page=app-codice&v="+v,{mode:'no-cors',keepalive:true}).catch(function(){}); }
          ping();
          setInterval(ping, 60000);
        }catch(e){}
      })();
    </script>
  </body>

</html>
