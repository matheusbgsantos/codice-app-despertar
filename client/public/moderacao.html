<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>𓂀 Moderação · Comunidade</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#060607;--card:#101014;--card2:#16161c;--gold:#C5A059;--ink:#EAEAEA;--mut:#8a8a8a;--line:#24242b;--red:#e0524f;--green:#3ad13a}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;max-width:760px;margin:0 auto;padding:0 14px 60px}
.top{padding:20px 4px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(6,6,7,.95);backdrop-filter:blur(10px);z-index:10;margin-bottom:18px}
.top h1{font-family:'Cinzel',serif;font-size:20px;color:var(--gold)}
.top .sub{font-size:12px;color:var(--mut);margin-top:2px}
.stats{display:flex;gap:10px;margin:14px 0}
.stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px;text-align:center}
.stat .n{font-family:'Cinzel',serif;font-size:22px;color:var(--gold)}
.stat .l{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.gate{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px;text-align:center;margin-top:40px}
.gate input{background:#0a0a0a;border:1px solid var(--line);border-radius:8px;color:var(--ink);padding:11px;font-size:14px;width:200px;margin:10px 0}
.gate button{background:var(--gold);color:#1a1206;border:0;border-radius:8px;padding:11px 24px;font-weight:600;cursor:pointer;font-family:inherit}
.post{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px}
.post.hidden{opacity:.5;border-style:dashed}
.post .h{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.post .email{font-size:13px;color:var(--gold);font-weight:600}
.post .meta{font-size:11px;color:var(--mut)}
.post .mood{font-size:13px;color:var(--ink);margin-bottom:4px}
.post .txt{font-size:14px;color:#d0d0d0;line-height:1.4}
.post .acts{display:flex;gap:8px;margin-top:10px}
.post .acts button{border:1px solid var(--line);background:#0a0a0a;color:var(--mut);border-radius:7px;padding:7px 13px;font-size:12px;cursor:pointer;font-family:inherit}
.post .acts .del{border-color:var(--red);color:var(--red)}
.post .acts .ban{border-color:#c78;color:#e09}
.post .tag{font-size:10px;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px}
.tag.anon{background:#1a2a1a;color:var(--green)}
.tag.pub{background:#2a2a1a;color:var(--gold)}
.tag.hid{background:#2a1a1a;color:var(--red)}
.empty{text-align:center;color:var(--mut);padding:40px}
</style></head>
<body>
  <div class="top">
    <h1>𓂀 Moderação · Comunidade</h1>
    <div class="sub">Você vê o email REAL de cada post (mesmo anônimos). Controle total.</div>
  </div>

  <div id="gate" class="gate">
    <div>🔒 Área restrita</div>
    <input type="password" id="key" placeholder="chave de acesso" />
    <br><button onclick="entrar()">Entrar</button>
  </div>

  <div id="app" style="display:none">
    <div class="stats">
      <div class="stat"><div class="n" id="stTotal">—</div><div class="l">Posts</div></div>
      <div class="stat"><div class="n" id="stVisiveis">—</div><div class="l">Visíveis</div></div>
      <div class="stat"><div class="n" id="stOcultos">—</div><div class="l">Ocultos</div></div>
    </div>
    <div id="feed"></div>
  </div>

<script>
var BASE="https://app-frequencia-production.up.railway.app/api/trpc";
var KEY="";
function entrar(){ KEY=document.getElementById("key").value.trim(); if(!KEY)return; document.getElementById("gate").style.display="none"; document.getElementById("app").style.display="block"; carregar(); }
function carregar(){
  var url=BASE+"/community.adminList?input="+encodeURIComponent(JSON.stringify({json:{key:KEY}}));
  fetch(url).then(r=>r.json()).then(d=>{
    var posts=(d.result&&d.result.data&&d.result.data.json&&d.result.data.json.posts)||[];
    render(posts);
  }).catch(e=>{document.getElementById("feed").innerHTML='<div class="empty">Erro ou chave inválida.</div>';});
}
function render(posts){
  document.getElementById("stTotal").textContent=posts.length;
  document.getElementById("stVisiveis").textContent=posts.filter(p=>!p.hidden).length;
  document.getElementById("stOcultos").textContent=posts.filter(p=>p.hidden).length;
  if(!posts.length){document.getElementById("feed").innerHTML='<div class="empty">Nenhum post ainda.</div>';return;}
  document.getElementById("feed").innerHTML=posts.map(function(p){
    var dt=new Date(p.createdAt).toLocaleString("pt-BR");
    var tag=p.hidden?'<span class="tag hid">Oculto</span>':(p.anon?'<span class="tag anon">Anônimo</span>':'<span class="tag pub">Público</span>');
    return '<div class="post'+(p.hidden?' hidden':'')+'">'+
      '<div class="h"><span class="email">'+esc(p.email)+'</span><span class="meta">'+dt+' · ❤'+p.likes+' '+tag+'</span></div>'+
      (p.mood?'<div class="mood">'+esc(p.mood)+'</div>':'')+
      (p.texto?'<div class="txt">'+esc(p.texto)+'</div>':'')+
      '<div class="acts">'+
        (p.hidden?'':'<button class="del" onclick="ocultar('+p.id+')">🗑 Excluir do feed</button>')+
        '<button class="ban" onclick="banir(\''+esc(p.email)+'\')">🚫 Banir este email</button>'+
      '</div></div>';
  }).join("");
}
function esc(s){return String(s||"").replace(/[<>&"]/g,function(c){return{'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c];});}
function ocultar(id){ if(!confirm("Excluir este post do feed?"))return;
  mut("community.adminHide",{key:KEY,postId:id}).then(carregar); }
function banir(email){ if(!confirm("Banir "+email+"? Todos os posts dele somem e ele não posta mais."))return;
  mut("community.adminBan",{key:KEY,email:email}).then(carregar); }
function mut(path,body){
  return fetch(BASE+"/"+path,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({json:body})}).then(r=>r.json());
}
</script>
</body></html>
