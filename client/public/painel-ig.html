<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Painel da Máquina · Instagram</title>
<style>
:root{--bg:#0a0908;--card:#131009;--bd:#2a2418;--gold:#d4a93f;--gold2:#c0922f;--tx:#ece6d8;--dim:#9c8e6c;--green:#3ad13a;--red:#e03a2f;--blue:#5aa7d6}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font:15px/1.5 'Segoe UI',system-ui,sans-serif;padding:16px;max-width:560px;margin:0 auto}
h1{font-size:15px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;display:flex;align-items:center;gap:8px}
.sub{color:var(--dim);font-size:11px;letter-spacing:1.5px;margin:2px 0 16px;text-transform:uppercase}
.live{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);animation:p 1.6s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
.sec{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold2);margin:20px 0 8px;border-bottom:1px solid var(--bd);padding-bottom:5px}
/* vídeo atual */
.video{background:var(--card);border:1px solid var(--gold2);border-radius:12px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.video .top{display:flex;gap:12px;padding:12px}
.video img{width:74px;height:98px;object-fit:cover;border-radius:8px;flex:none;background:#000}
.video .cap{font-size:13.5px;line-height:1.35}
.video .when{font-size:11px;color:var(--green);margin-top:4px;text-transform:uppercase;letter-spacing:1px}
.eng{font-size:12px;color:var(--dim);margin-top:6px}
.eng b{color:var(--gold)}
.g6{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 12px 12px}
.m{background:#0e0c08;border:1px solid var(--bd);border-radius:8px;padding:10px 6px;text-align:center}
.m .n{font-size:19px;font-weight:700;color:var(--tx)}
.m .t{font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-top:1px}
.m.hot{border-color:var(--gold2)}.m.hot .n{color:var(--gold)}
/* funil */
.funil{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:14px}
.et{margin-bottom:12px}
.et:last-child{margin-bottom:0}
.et .cab{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.et .rot{font-size:12px;letter-spacing:.5px;color:var(--tx)}
.et .rot small{display:block;font-size:10px;color:var(--dim)}
.et .num{font-size:22px;font-weight:800;color:var(--gold)}
.bar{height:14px;border-radius:7px;background:#0e0c08;border:1px solid var(--bd);overflow:hidden}
.bar i{display:block;height:100%;border-radius:7px;background:linear-gradient(90deg,var(--gold2),var(--gold))}
.tx-conv{text-align:right;font-size:11px;color:var(--green);margin-top:2px;font-weight:600}
.nota{font-size:10px;color:var(--dim);margin-top:8px;text-align:center;letter-spacing:.5px}
/* anteriores */
.old{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;margin-bottom:8px;opacity:.85}
.old .cap{font-size:12px;color:var(--dim);margin-bottom:6px}
.old .lin{display:flex;gap:14px;font-size:12px}
.old .lin b{color:var(--tx)}
.err{background:#2a1210;border:1px solid #6b2018;color:#ff9b8f;border-radius:8px;padding:12px;font-size:13px}
.ft{text-align:center;color:var(--dim);font-size:10.5px;letter-spacing:1px;margin-top:16px;text-transform:uppercase}
.ft a{color:var(--gold2);text-decoration:none}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.kpi{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:12px 14px}
.kpi .l{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim)}
.kpi .v{font-size:24px;font-weight:700;color:var(--gold);margin-top:2px}
</style></head>
<body>
<h1>𓂀 Painel da Máquina <span class="live"></span></h1>
<div class="sub">Instagram · @codice.oculto · atualiza sozinho a cada 60s</div>
<div id="app">Carregando a máquina…</div>
<div class="ft">💰 Caixa: <a href="painel-tempo-real.html">Painel Códice</a> · Arquivos Ocultos · uso interno</div>
<script>
function ago(ts){const m=Math.floor((Date.now()-new Date(ts))/60000);if(m<60)return '🔴 no ar há '+m+' min';const h=Math.floor(m/60);if(h<48)return '🔴 no ar há '+h+'h'+String(m%60).padStart(2,'0');return Math.floor(h/24)+' dias no ar'}
function f(n){if(n==null)return '–';if(n>=1000000)return (n/1000000).toFixed(1)+'M';if(n>=1000)return (n/1000).toFixed(1).replace('.0','')+'k';return String(n)}
function pct(a,b){if(!a||!b)return null;return Math.round(a/b*100)}
async function load(){
 try{
  const r=await fetch('/api/ig-metrics');const d=await r.json();
  if(d.erro){document.getElementById('app').innerHTML='<div class="err">⚠️ '+d.erro+'</div>';return}
  const p=d.posts[0]||{};
  const eng=p.reach&&p.interacoes?(p.interacoes/p.reach*100).toFixed(1):null;
  const engSelo=eng>=10?'🔥 ALTÍSSIMO':(eng>=5?'✅ ALTO':'· normal');
  let h='';

  h+='<div class="sec">📍 O vídeo de agora</div>';
  h+='<div class="video"><div class="top">';
  h+= p.thumb?'<img src="'+p.thumb+'">':'';
  h+='<div><div class="cap">'+(p.caption||'')+'…</div><div class="when">'+ago(p.timestamp)+'</div>';
  h+= eng?'<div class="eng">Engajamento: <b>'+eng+'%</b> '+engSelo+'</div>':'';
  h+='</div></div><div class="g6">';
  h+='<div class="m hot"><div class="n">'+f(p.views)+'</div><div class="t">👁️ Views</div></div>';
  h+='<div class="m"><div class="n">'+f(p.reach)+'</div><div class="t">Pessoas</div></div>';
  h+='<div class="m"><div class="n">'+(p.watch_ms?Math.round(p.watch_ms/1000)+'s':'–')+'</div><div class="t">Retenção</div></div>';
  h+='<div class="m hot"><div class="n">'+f(p.comentarios)+'</div><div class="t">💬 Coment.</div></div>';
  h+='<div class="m"><div class="n">'+f(p.shares)+'</div><div class="t">📤 Shares</div></div>';
  h+='<div class="m"><div class="n">'+f(p.saves)+'</div><div class="t">🔖 Saves</div></div>';
  h+='</div></div>';

  const comFunil=d.posts.filter(x=>x.palavra&&(x.pedidos>0||x.entregues>0));
  for(const q of comFunil){
   const mais=q.varreduraCompleta?'':'+';
   const c1=pct(q.entregues,q.pedidos), c2=pct(q.cliques,q.entregues);
   const base=Math.max(q.pedidos||0,1);
   h+='<div class="sec">📁 Funil "'+q.palavra.toUpperCase()+'" · '+(q.caption||'').slice(0,42)+'…</div>';
   h+='<div class="funil">';
   h+='<div class="et"><div class="cab"><span class="rot">🗣️ PEDIRAM<small>comentaram a palavra</small></span><span class="num">'+f(q.pedidos)+mais+'</span></div><div class="bar"><i style="width:100%"></i></div></div>';
   h+='<div class="et"><div class="cab"><span class="rot">📨 RECEBERAM<small>DM entregue pelo robô</small></span><span class="num">'+f(q.entregues)+mais+'</span></div><div class="bar"><i style="width:'+Math.min(100,(q.entregues||0)/base*100)+'%"></i></div>'+(c1!=null?'<div class="tx-conv">'+c1+'% de entrega</div>':'')+'</div>';
   let rotClq='';
   if(c2!=null){rotClq = q.cliques>q.entregues ? '<div class="tx-conv">DM + bio + stories somam aqui 🔥</div>' : '<div class="tx-conv">'+c2+'% dos que receberam abriram</div>';}
   h+='<div class="et"><div class="cab"><span class="rot">👆 ABRIRAM O ARQUIVO<small>visitas na página, todas as portas ('+(d.cliquesNota||'')+')</small></span><span class="num">'+f(q.cliques)+'</span></div><div class="bar"><i style="width:'+Math.min(100,(q.cliques||0)/base*100)+'%"></i></div>'+rotClq+'</div>';
   h+='<div class="nota">🛒 A venda aparece no Painel Códice (conversão por página)</div>';
   h+='</div>';
  }

  h+='<div class="row2"><div class="kpi"><div class="l">Seguidores</div><div class="v">'+f(d.seguidores)+'</div></div><div class="kpi"><div class="l">Interações no vídeo</div><div class="v">'+f(p.interacoes)+'</div></div></div>';

  h+='<div class="sec">Vídeos anteriores (a régua)</div>';
  for(let i=1;i<d.posts.length;i++){const q=d.posts[i];
   h+='<div class="old"><div class="cap">'+(q.caption||'')+'…</div><div class="lin">';
   h+='<span>👁️ <b>'+f(q.views)+'</b></span><span>💬 <b>'+f(q.comentarios)+'</b></span><span>📤 <b>'+f(q.shares)+'</b></span><span>🔖 <b>'+f(q.saves)+'</b></span><span>⏱️ <b>'+(q.watch_ms?Math.round(q.watch_ms/1000)+'s':'–')+'</b></span>';
   h+='</div></div>';
  }
  document.getElementById('app').innerHTML=h;
 }catch(e){document.getElementById('app').innerHTML='<div class="err">⚠️ Falha ao carregar. Recarrega a página.</div>'}
}
load();setInterval(load,60000);
</script>
</body></html>
